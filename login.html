<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Bevenu</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-page">
<div id="toast-container"></div>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-logo"><a href="index.html"><span class="logo-text">Bevenu</span><span class="logo-dot">.</span></a></div>
    <div class="nav-actions">
      <button class="nav-btn" id="theme-toggle"><i class="fas fa-moon" id="theme-icon"></i></button>
    </div>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-visual">
    <div class="auth-visual-content">
      <h2 class="auth-brand">Bevenu<span>.</span></h2>
      <p class="auth-tagline">Where Style Meets Soul</p>
      <div class="auth-features">
        <div class="auth-feature"><i class="fas fa-shipping-fast"></i><span>Fast Delivery</span></div>
        <div class="auth-feature"><i class="fas fa-tags"></i><span>Exclusive Offers</span></div>
        <div class="auth-feature"><i class="fas fa-heart"></i><span>Curated Picks</span></div>
      </div>
    </div>
    <div class="auth-decoration">
      <div class="auth-circle ac1"></div>
      <div class="auth-circle ac2"></div>
      <div class="auth-circle ac3"></div>
    </div>
  </div>

  <div class="auth-form-container">
    <div class="auth-form active" id="login-form">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Login to your Bevenu account</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="login-email" placeholder="you@example.com" class="input-field" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="login-password" placeholder="Enter your password" class="input-field" />
          <button class="toggle-password" onclick="togglePass('login-password')"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember-me" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full" onclick="handleLogin()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <div class="divider"><span>or continue with</span></div>

      <div class="social-auth">
        <button class="social-btn google-btn" onclick="googleLogin()">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn fb-btn" onclick="fbLogin()">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>

      <p class="switch-form">
        Don't have an account? <a href="#" onclick="switchForm('signup')">Sign Up</a>
      </p>
    </div>


    <div class="auth-form" id="signup-form">
      <div class="form-header">
        <h2>Join Bevenu</h2>
        <p>Create your account today</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="signup-fname" placeholder="First name" class="input-field" />
          </div>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <div class="input-icon-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="signup-lname" placeholder="Last name" class="input-field" />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="signup-email" placeholder="you@example.com" class="input-field" />
        </div>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-phone"></i>
          <input type="tel" id="signup-phone" placeholder="+91 9876543210" class="input-field" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="signup-password" placeholder="Create a password" class="input-field" />
          <button class="toggle-password" onclick="togglePass('signup-password')"><i class="fas fa-eye"></i></button>
        </div>
        <div class="password-strength" id="password-strength"></div>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="signup-terms" />
          <span>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></span>
        </label>
      </div>

      <button class="btn btn-primary btn-full" onclick="handleSignup()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>

      <p class="switch-form">
        Already have an account? <a href="#" onclick="switchForm('login')">Login</a>
      </p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initTheme();

    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (user) {
      showToast(`Already logged in as ${user.name}`, 'info');
      setTimeout(() => window.location.href = 'index.html', 1500);
    }
    const params = new URLSearchParams(window.location.search);
    if (params.get('form') === 'signup') switchForm('signup');
    document.getElementById('signup-password')?.addEventListener('input', checkPasswordStrength);
  });

  function switchForm(form) {
    document.getElementById('login-form').classList.toggle('active', form === 'login');
    document.getElementById('signup-form').classList.toggle('active', form === 'signup');
    document.title = (form === 'login' ? 'Login' : 'Sign Up') + ' — Bevenu';
  }

  function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) { showToast('Please fill in all fields', 'error'); return; }
    if (!email.includes('@')) { showToast('Enter a valid email address', 'error'); return; }

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem('currentUser', JSON.stringify(user));
      showToast(`Welcome back, ${user.name}! 🎉`, 'success');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } else {
      showToast('Invalid email or password', 'error');
    }
  }

  function handleSignup() {
    const fname = document.getElementById('signup-fname').value.trim();
    const lname = document.getElementById('signup-lname').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const phone = document.getElementById('signup-phone').value.trim();
    const password = document.getElementById('signup-password').value;
    const terms = document.getElementById('signup-terms').checked;

    if (!fname || !lname || !email || !password) { showToast('Please fill in all fields', 'error'); return; }
    if (!email.includes('@')) { showToast('Enter a valid email', 'error'); return; }
    if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
    if (!terms) { showToast('Please accept the Terms & Conditions', 'error'); return; }

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    if (users.find(u => u.email === email)) { showToast('Email already registered', 'error'); return; }

    const newUser = { id: Date.now(), name: `${fname} ${lname}`, email, phone, password, createdAt: new Date().toISOString() };
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('currentUser', JSON.stringify(newUser));
    showToast(`Welcome to Bevenu, ${fname}! 🎉`, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  }

  function togglePass(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function checkPasswordStrength() {
    const password = document.getElementById('signup-password').value;
    const bar = document.getElementById('password-strength');
    let strength = 0;
    if (password.length >= 6) strength++;
    if (password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^A-Za-z0-9]/)) strength++;
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#22c55e'];
    bar.innerHTML = `<div class="strength-bar"><div style="width:${strength*25}%;background:${colors[strength]};height:4px;border-radius:4px;transition:all 0.3s"></div></div><span style="color:${colors[strength]};font-size:12px">${labels[strength]}</span>`;
  }

  function googleLogin() { showToast('Google login coming soon!', 'info'); }
  function fbLogin() { showToast('Facebook login coming soon!', 'info'); }
</script>
</body>
</html>
