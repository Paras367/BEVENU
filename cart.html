<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart | Bevenu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="cart">
    <nav class="navbar">
        <div class="container nav-wrapper">
            <a href="./" class="logo">Bevenu</a>
            <div class="nav-actions">
                <button class="nav-btn theme-toggle"><i class="fas fa-moon"></i></button>
                <a href="./cart.html" class="nav-btn"><i class="fas fa-shopping-bag"></i><span class="badge cart-count">0</span></a>
                <button id="userProfileBtn" class="nav-btn"><i class="fas fa-user-circle"></i></button>
            </div>
        </div>
    </nav>

    <main class="container cart-container">
        <h2 style="margin-bottom: 2rem;">Shopping Cart</h2>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <div class="cart-items"></div>
            <div class="cart-summary"></div>
        </div>
    </main>

    <div class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
